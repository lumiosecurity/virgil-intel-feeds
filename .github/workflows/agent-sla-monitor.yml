name: Agent — SLA Monitor

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sla-monitor:
    name: SLA Monitor
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout virgil-agents
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/virgil-agents
          token: ${{ secrets.VIRGIL_GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install dependencies
        run: npm install -g wrangler && npm install @anthropic-ai/sdk 2>/dev/null || true

      - name: Run SLA monitor
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN:          ${{ secrets.VIRGIL_GITHUB_TOKEN }}
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKER_URL:            ${{ secrets.WORKER_URL }}
          SLACK_WEBHOOK_URL:     ${{ secrets.SLACK_WEBHOOK_URL }}
          ORG_NAME:              ${{ github.repository_owner }}
          CORE_RULES_REPO:       virgil-core-rules
        run: node agents/agent-sla-monitor.js
