name: Ingest Threat Feeds

on:
  schedule:
    # Every 6 hours — balances freshness against feed rate limits
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      feeds:
        description: 'Feeds to ingest (space-separated, blank = all)'
        required: false
        default: ''
      limit:
        description: 'Max URLs per feed'
        required: false
        default: '500'
      dry_run:
        description: 'Dry run (analyse only, no POST)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  ingest:
    name: Ingest
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout intel-feeds
        uses: actions/checkout@v4

      - name: Checkout virgil-core-rules (for source patterns)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/virgil-core-rules
          token: ${{ secrets.VIRGIL_GITHUB_TOKEN }}
          path: virgil-core-rules

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run ingestion
        env:
          TELEMETRY_ENDPOINT:  ${{ secrets.TELEMETRY_ENDPOINT }}
          PIPELINE_SECRET:     ${{ secrets.PIPELINE_SECRET }}
          URLSCAN_API_KEY:     ${{ secrets.URLSCAN_API_KEY }}
          PHISHTANK_APP_KEY:   ${{ secrets.PHISHTANK_APP_KEY }}
          URLHAUS_AUTH_KEY:    ${{ secrets.URLHAUS_AUTH_KEY }}
          CORE_RULES_PATH:     virgil-core-rules/rules/source
          VIRGIL_GITHUB_TOKEN: ${{ secrets.VIRGIL_GITHUB_TOKEN }}
        run: |
          ARGS="${{ github.event.inputs.feeds }}"
          LIMIT="--limit=${{ github.event.inputs.limit || '500' }}"
          DRY="${{ github.event.inputs.dry_run }}"
          if [ "$DRY" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          node scripts/ingest-feeds.js $ARGS $LIMIT 2>&1 | tee /tmp/ingest-output.txt

      - name: Create summary
        if: always()
        run: |
          echo "## Threat Feed Ingestion" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/ingest-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `Feed ingestion failed — ${new Date().toISOString().slice(0,10)}`,
              body:  `Scheduled threat feed ingestion failed.\n\nRun: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['ingestion-failure'],
            });
