name: Agent — Docs Maintainer

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 10 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Audit mode'
        type: choice
        options: [push, weekly]
        default: weekly

permissions:
  contents: read
  issues: write

jobs:
  docs-maintainer:
    name: Docs Maintainer
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout virgil-agents
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/virgil-agents
          token: ${{ secrets.VIRGIL_GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install dependencies
        run: npm install -g wrangler && npm install @anthropic-ai/sdk 2>/dev/null || true

      - name: Run docs maintainer
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN:          ${{ secrets.VIRGIL_GITHUB_TOKEN }}
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ORG_NAME:              ${{ github.repository_owner }}
          CORE_RULES_REPO:       virgil-core-rules
          AUDIT_MODE:            ${{ github.event_name == 'push' && 'push' || github.event.inputs.mode || 'weekly' }}
          CHANGED_FILES:         ${{ github.event_name == 'push' && join(github.event.commits[0].modified, ',') || '' }}
        run: node agents/agent-docs-maintainer.js
