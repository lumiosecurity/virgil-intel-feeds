name: Agent — Campaign Clustering

on:
  schedule:
    - cron: '0 3 * * *'   # Nightly 03:00 UTC
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'Days to look back'
        default: '3'
      min_cluster:
        description: 'Minimum domains per cluster'
        default: '3'
      dry_run:
        type: boolean
        default: false

permissions:
  issues: write
  contents: read

jobs:
  cluster:
    name: Cluster Campaigns
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install wrangler
        run: npm install -g wrangler
      - name: Run clustering agent
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ORG_NAME:             ${{ github.repository_owner }}
          LOOKBACK_DAYS:        ${{ github.event.inputs.lookback_days || '3' }}
          MIN_CLUSTER:          ${{ github.event.inputs.min_cluster || '3' }}
        run: |
          ARGS=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && ARGS="--dry-run"
          node agents/agent-campaign-clustering.js $ARGS
