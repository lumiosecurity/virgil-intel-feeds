name: Agent — Meta-Rule Engineer
on:
  schedule:
    - cron: '0 5 * * 3'   # Wednesdays 05:00 UTC
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'Number of days to look back in corpus'
        default: '14'
      dry_run:
        description: 'Dry run (no issue created)'
        type: boolean
        default: false

permissions:
  issues: write
  contents: read

jobs:
  meta-rule-engineer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run meta-rule engineer agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOOKBACK_DAYS: ${{ inputs.lookback_days || '14' }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          node agents/agent-meta-rules.js $ARGS
